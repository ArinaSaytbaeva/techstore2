<!DOCTYPE html>
<html>
<head>
    <title>Мои заказы - TechStore</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="header">
        <div class="header-content">
            <a href="/" class="logo">Tech<span>Store</span></a>
            <div class="user-info">
                <a href="/orders.html" class="orders-link active">📦 Мои заказы</a>
                <span class="user-name" id="userName">👤 Гость</span>
                <a href="/login.html" class="login-btn" id="loginLink">Войти</a>
                <button class="logout-btn" id="logoutBtn" onclick="logout()" style="display: none;">Выйти</button>
            </div>
        </div>
    </div>

    <div class="orders-container">
        <h1>📦 Мои заказы</h1>
        <div id="orders-list" class="orders-list">
            <div class="loading">Загрузка заказов...</div>
        </div>
    </div>

    <script>
        let currentUser = null;

        async function checkAuth() {
            const token = localStorage.getItem('token');
            if (!token) {
                window.location.href = '/login.html';
                return false;
            }
            try {
                const response = await fetch('/api/auth/me', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (response.ok) {
                    currentUser = await response.json();
                    document.getElementById('userName').textContent = `👤 ${currentUser.name}`;
                    document.getElementById('loginLink').style.display = 'none';
                    document.getElementById('logoutBtn').style.display = 'inline-block';
                    loadOrders();
                    return true;
                } else {
                    window.location.href = '/login.html';
                    return false;
                }
            } catch (error) {
                console.error('Auth error:', error);
                window.location.href = '/login.html';
                return false;
            }
        }

        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = '/login.html';
        }

        async function loadOrders() {
            const token = localStorage.getItem('token');
            try {
                const response = await fetch('/api/orders/my', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const orders = await response.json();
                displayOrders(orders);
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('orders-list').innerHTML = '<div class="error">Ошибка загрузки заказов</div>';
            }
        }

        function getStatusText(status) {
            const statuses = {
                'pending': '⏳ В обработке',
                'confirmed': '✅ Подтвержден',
                'shipped': '🚚 В доставке',
                'delivered': '📦 Доставлен',
                'cancelled': '❌ Отменен'
            };
            return statuses[status] || status;
        }

        function getStatusClass(status) {
            const classes = {
                'pending': 'status-pending',
                'confirmed': 'status-confirmed',
                'shipped': 'status-shipped',
                'delivered': 'status-delivered',
                'cancelled': 'status-cancelled'
            };
            return classes[status] || '';
        }

        function formatDate(dateString) {
            const date = new Date(dateString);
            return date.toLocaleDateString('ru-RU', {
                day: 'numeric',
                month: 'long',
                year: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
        }

        function displayOrders(orders) {
            const container = document.getElementById('orders-list');
            
            if (orders.length === 0) {
                container.innerHTML = `
                    <div class="empty-orders">
                        <div class="empty-icon">📦</div>
                        <h3>У вас пока нет заказов</h3>
                        <p>Перейдите в каталог и сделайте первый заказ</p>
                        <a href="/" class="catalog-link">Перейти в каталог</a>
                    </div>
                `;
                return;
            }

            container.innerHTML = orders.map(order => `
                <div class="order-card">
                    <div class="order-header">
                        <div class="order-number">
                            <strong>Заказ №${order._id.slice(-8)}</strong>
                            <span class="order-date">от ${formatDate(order.createdAt)}</span>
                        </div>
                        <div class="order-status ${getStatusClass(order.status)}">
                            ${getStatusText(order.status)}
                        </div>
                    </div>
                    
                    <div class="order-items">
                        ${order.products.map(item => `
                            <div class="order-item">
                                <div class="order-item-image">
                                    <img src="${item.productId?.image || 'https://via.placeholder.com/60'}" alt="${item.productId?.name}">
                                </div>
                                <div class="order-item-info">
                                    <div class="order-item-title">${item.productId?.name || 'Товар'}</div>
                                    <div class="order-item-price">${item.price.toLocaleString()} ₽ × ${item.quantity}</div>
                                </div>
                                <div class="order-item-total">
                                    ${(item.price * item.quantity).toLocaleString()} ₽
                                </div>
                            </div>
                        `).join('')}
                    </div>
                    
                    <div class="order-footer">
                        <div class="order-total">
                            Итого: <span>${order.total.toLocaleString()} ₽</span>
                        </div>
                        <button class="repeat-order-btn" onclick="repeatOrder('${order._id}')">Повторить заказ</button>
                    </div>
                </div>
            `).join('');
        }

        async function repeatOrder(orderId) {
            const token = localStorage.getItem('token');
            try {
                const response = await fetch(`/api/orders/${orderId}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const order = await response.json();
                
                for (const item of order.products) {
                    fetch('/api/orders', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${token}`
                        },
                        body: JSON.stringify({
                            products: [{
                                productId: item.productId._id,
                                quantity: item.quantity,
                                price: item.price
                            }],
                            total: item.price * item.quantity
                        })
                    });
                }
                alert('✅ Товары добавлены в корзину!');
                window.location.href = '/';
            } catch (error) {
                console.error('Error:', error);
                alert('❌ Ошибка при повторении заказа');
            }
        }

        document.addEventListener('DOMContentLoaded', checkAuth);
    </script>

    <style>
        .orders-container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 40px 24px;
        }
        
        .orders-container h1 {
            margin-bottom: 30px;
            color: #333;
        }
        
        .order-card {
            background: white;
            border-radius: 16px;
            margin-bottom: 20px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        
        .order-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            background: #f8f9fa;
            border-bottom: 1px solid #eaeaea;
        }
        
        .order-number {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        
        .order-number strong {
            font-size: 16px;
            color: #333;
        }
        
        .order-date {
            font-size: 12px;
            color: #999;
        }
        
        .order-status {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
        }
        
        .status-pending { background: #fff3e0; color: #ff9800; }
        .status-confirmed { background: #e3f2fd; color: #2196f3; }
        .status-shipped { background: #e8f5e9; color: #4caf50; }
        .status-delivered { background: #e8f5e9; color: #2e7d32; }
        .status-cancelled { background: #ffebee; color: #f44336; }
        
        .order-items {
            padding: 16px 20px;
        }
        
        .order-item {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 12px 0;
            border-bottom: 1px solid #f0f0f0;
        }
        
        .order-item:last-child {
            border-bottom: none;
        }
        
        .order-item-image img {
            width: 60px;
            height: 60px;
            object-fit: contain;
            background: #f8f8f8;
            border-radius: 8px;
        }
        
        .order-item-info {
            flex: 1;
        }
        
        .order-item-title {
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 4px;
        }
        
        .order-item-price {
            font-size: 12px;
            color: #666;
        }
        
        .order-item-total {
            font-size: 16px;
            font-weight: 600;
            color: #333;
        }
        
        .order-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            background: #f8f9fa;
            border-top: 1px solid #eaeaea;
        }
        
        .order-total {
            font-size: 14px;
            color: #666;
        }
        
        .order-total span {
            font-size: 20px;
            font-weight: 700;
            color: #ff6b00;
        }
        
        .repeat-order-btn {
            background: #005bff;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
        }
        
        .repeat-order-btn:hover {
            background: #0046cc;
        }
        
        .empty-orders {
            text-align: center;
            padding: 60px 20px;
            background: white;
            border-radius: 16px;
        }
        
        .empty-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }
        
        .empty-orders h3 {
            margin-bottom: 10px;
            color: #333;
        }
        
        .empty-orders p {
            color: #666;
            margin-bottom: 20px;
        }
        
        .catalog-link {
            display: inline-block;
            background: #005bff;
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            text-decoration: none;
        }
        
        .orders-link.active {
            background: #005bff;
            color: white;
        }
        
        .loading, .error {
            text-align: center;
            padding: 40px;
            color: #666;
        }
    </style>
</body>
</html>
